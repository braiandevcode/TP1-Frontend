<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/form.css">
    <title>Contacto</title>
</head>
<body>
    <div class="contact">
        <!-- DATOS DE CONTACTO -->
        <div class="section-contact">
            <h2>Supermercado MB</h2>
            <ul class="section-contact">
                <li><i class="bi bi-geo-alt-fill"></i>Calle Dorrego 123, Tapalque, Argentina</li>
                <li><i class="bi bi-telephone-fill"></i> +123 456 789</li>
                <li><i class="bi bi-envelope-at-fill"></i>contacto@supermercadomb.com</li>
            </ul>
        </div>
        <div class="section-form">
            <form class="form">
                <div class="form__label">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" placeholder="Ingrese su nombre" required>
                </div>
                <div class="form__label">
                    <label for="surname">Apellido:</label>
                    <input type="text" id="surname" name="surname" placeholder="Ingrese su apellido" required>
                </div>
                <div class="form__label">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ingrese su correo" required>
                </div>
                <div class="form__label">
                    <label for="phone">Telefono</label>
                    <input type="tel" id="email" name="email" placeholder="Ingrese su telefono" required>
                </div>
                <div class="form__label">
                    <textarea name="box" placeholder="Comentario..."></textarea>
                </div>
                <input type="submit" value="Enviar">
            </form>
        </div>
    </div>
</body>
</html>
